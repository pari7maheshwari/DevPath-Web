name: Auto Label and Comment Issues

on:
  issues:
    types: [opened]

permissions:
  issues: write

jobs:
  label-and-comment:
    runs-on: ubuntu-latest
    steps:
      - name: Add gssoc26 label and welcome comment to new issues
        uses: actions/github-script@v7
        with:
          script: |
            // Add the gssoc26 label
            await github.rest.issues.addLabels({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: ['gssoc26']
            });
            
            // Post a welcome comment
            const message = `Welcome to DevPath Community's Official Repository! 🎉 Thank you for bringing this up and starting your contributions to our project. \n\nPlease do star ⭐ the repo and keep growing in your Open Source Journey! 🚀\n\n@${context.actor}, @Aditya948351 or @devpathindcommunity-india will review this and assign you this issue ASAP by checking if it is really needed for the website.`;
            
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: message
            });
